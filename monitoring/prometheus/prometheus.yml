global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Playwright test-run metrics land here via scripts/export-metrics.js
  - job_name: 'qa_platform_tests'
    honor_labels: true
    static_configs:
      - targets: ['pushgateway:9091']
