name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Also run unattended every 6 hours to monitor the third-party API's health.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run API tests against JSONPlaceholder
      run: npx playwright test
    - name: Export test-run metrics
      if: ${{ !cancelled() }}
      env:
        PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
        DD_API_KEY: ${{ secrets.DD_API_KEY }}
      run: npm run metrics:export
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30
