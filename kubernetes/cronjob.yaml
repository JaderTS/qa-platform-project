# Runs the Playwright API suite on a schedule and reports metrics to the
# in-cluster Pushgateway (see pushgateway.yaml) and, if DD_API_KEY is set,
# straight to Datadog too. The image is built and published automatically
# by .github/workflows/playwright.yml on every merge to main - nothing to
# build by hand here, `imagePullPolicy: Always` just picks up the latest tag.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: qa-tests
  namespace: qa-platform
spec:
  schedule: "0 * * * *" # hourly
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: qa-tests
              image: ghcr.io/jaderts/qa-platform-tests:latest
              imagePullPolicy: Always
              command: ["sh", "-c", "npx playwright test; npm run metrics:export"]
              env:
                - name: CI
                  value: "true"
                - name: API_BASE_URL
                  value: https://jsonplaceholder.typicode.com
                - name: PUSHGATEWAY_URL
                  value: http://pushgateway:9091
                - name: DD_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: datadog-credentials
                      key: dd-api-key
                      optional: true
                - name: DD_SITE
                  value: us5.datadoghq.com
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
