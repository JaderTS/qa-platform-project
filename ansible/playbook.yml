---
- name: Provision the QA cloud platform runner
  hosts: qa_runner
  become: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - git
        state: present

    - name: Add Docker's official GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
        force: false

    - name: Add the Docker apt repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ (ansible_architecture == 'aarch64') | ternary('arm64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
        filename: docker

    - name: Install Docker Engine and Compose plugin
      ansible.builtin.apt:
        update_cache: true
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present

    - name: Add ansible_user to the docker group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Ensure Docker is enabled and running
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Clone the QA platform repository
      ansible.builtin.git:
        repo: "{{ qa_platform_repo_url }}"
        dest: "{{ qa_platform_dir }}"
        version: "{{ qa_platform_repo_version }}"
        force: true

    - name: Render the Docker Compose .env file (domain, Datadog and Groq keys)
      ansible.builtin.template:
        src: templates/env.j2
        dest: "{{ qa_platform_dir }}/docker/.env"
        mode: "0600"

    # Always pull the pre-built image from GHCR (published by
    # .github/workflows/playwright.yml) instead of building it here: a local
    # `npm ci` + Docker build alongside Prometheus/Grafana/Caddy is what
    # exhausted a t3.micro's CPU/RAM during earlier provisioning attempts.
    - name: Pull the pre-built qa-tests image from GHCR
      ansible.builtin.command: docker compose -f docker-compose.yml pull qa-tests
      args:
        chdir: "{{ qa_platform_dir }}/docker"
      changed_when: true

    # The Datadog Agent container is intentionally not started here: it
    # competes with Prometheus/Grafana/Caddy for memory the runner doesn't
    # have to spare. scripts/export-metrics.js already pushes the same
    # metrics straight to the Datadog API when DD_API_KEY is set, with no
    # agent required - see docker/docker-compose.yml.
    - name: Start the monitoring stack + QA assistant (with HTTPS via Caddy) and run the test suite once
      ansible.builtin.shell: |
        docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d prometheus grafana pushgateway assistant caddy
        docker compose -f docker-compose.yml run --rm qa-tests
      args:
        chdir: "{{ qa_platform_dir }}/docker"

    - name: Schedule the QA suite to run hourly (pull first, then run)
      ansible.builtin.cron:
        name: "qa-platform test suite"
        minute: "0"
        job: >-
          cd {{ qa_platform_dir }}/docker &&
          docker compose -f docker-compose.yml pull qa-tests &&
          docker compose -f docker-compose.yml run --rm qa-tests >> /var/log/qa-platform-tests.log 2>&1
