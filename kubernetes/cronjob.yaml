# Runs the Playwright API suite on a schedule and reports metrics to the
# in-cluster Pushgateway (see pushgateway.yaml). Build and push the image
# from the repo root Dockerfile first, e.g.:
#   docker build -t ghcr.io/<you>/qa-platform-tests:latest .
#   docker push ghcr.io/<you>/qa-platform-tests:latest
apiVersion: batch/v1
kind: CronJob
metadata:
  name: qa-tests
  namespace: qa-platform
spec:
  schedule: "0 * * * *" # hourly
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: qa-tests
              image: ghcr.io/CHANGE_ME/qa-platform-tests:latest
              command: ["sh", "-c", "npx playwright test; npm run metrics:export"]
              env:
                - name: CI
                  value: "true"
                - name: API_BASE_URL
                  value: https://jsonplaceholder.typicode.com
                - name: PUSHGATEWAY_URL
                  value: http://pushgateway:9091
              resources:
                requests:
                  cpu: 250m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 1Gi
