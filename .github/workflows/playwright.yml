name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Also run unattended every 6 hours to monitor the third-party API's health.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run API tests against JSONPlaceholder
      run: npx playwright test
    - name: Export test-run metrics
      if: ${{ !cancelled() }}
      env:
        PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
        DD_API_KEY: ${{ secrets.DD_API_KEY }}
        DD_SITE: ${{ secrets.DD_SITE }}
      run: npm run metrics:export
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: |
          playwright-report/
          test-results/
        retention-days: 30

  # Publishes the qa-tests image to GHCR only after the tests above pass, and
  # only from main - so the EC2 runner (see ansible/) never has to build the
  # image itself, it just `docker compose pull`s this. That keeps it light
  # enough to live on a free-tier t3.micro instance.
  build-and-push:
    needs: test
    if: ${{ github.ref == 'refs/heads/main' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4
    - name: Lowercase the image owner (GHCR requires lowercase)
      id: vars
      run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3
    - uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        # amd64 for the EC2 runner/most Kubernetes nodes, arm64 so it also
        # runs unmodified on Apple Silicon dev machines.
        platforms: linux/amd64,linux/arm64
        tags: |
          ghcr.io/${{ steps.vars.outputs.owner }}/qa-platform-tests:latest
          ghcr.io/${{ steps.vars.outputs.owner }}/qa-platform-tests:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Publishes the Playwright HTML report as a public, no-login-required page
  # so periodic runs (the schedule trigger above) are visible to anyone,
  # not just whoever has access to this GitHub repo's Actions tab. Runs even
  # if tests failed - a failing report is exactly what proves the schedule
  # is really catching problems - just never from a PR (untrusted branches
  # can't get Pages deploy permissions anyway, and it'd be noise).
  publish-report:
    needs: test
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: playwright-report
        path: report
    - uses: actions/upload-pages-artifact@v3
      with:
        path: report/playwright-report
    - id: deployment
      uses: actions/deploy-pages@v4
