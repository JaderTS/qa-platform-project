services:
  qa-tests:
    # `image:` lets `docker compose pull` fetch the version built and
    # published by .github/workflows/playwright.yml on every merge to main,
    # so the runner never has to build it locally (see ansible/playbook.yml).
    # `build:` is only used when you explicitly run `docker compose build`
    # for local development.
    image: ghcr.io/jaderts/qa-platform-tests:latest
    build:
      context: ..
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - CI=true
      - API_BASE_URL=https://jsonplaceholder.typicode.com
      - PUSHGATEWAY_URL=http://pushgateway:9091
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_SITE=${DD_SITE:-datadoghq.com}
    volumes:
      - ../test-results:/app/test-results
      - ../playwright-report:/app/playwright-report
    command: >
      sh -c "npx playwright test; npm run metrics:export"
    depends_on:
      - pushgateway

  pushgateway:
    image: prom/pushgateway:latest
    restart: unless-stopped
    ports:
      - "9091:9091"

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - pushgateway

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # Same image as qa-tests (it already has assistant/ and scripts/lib/ baked
  # in via the Dockerfile's `COPY . .`) - just runs the Express server
  # instead of the test suite. Reached through Caddy at /ask (see Caddyfile),
  # never published to the host directly.
  assistant:
    image: ghcr.io/jaderts/qa-platform-tests:latest
    restart: unless-stopped
    command: ["node", "assistant/server.js"]
    environment:
      - DD_API_KEY=${DD_API_KEY:-}
      - DD_APP_KEY=${DD_APP_KEY:-}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - GROQ_API_KEY=${GROQ_API_KEY:-}

  # Datadog itself is not optional - scripts/export-metrics.js always pushes
  # metrics straight to the Datadog API when DD_API_KEY is set (see .env).
  # This local Agent container is a separate, heavier add-on (host-level
  # metrics/APM) for instances with RAM to spare: `docker compose --profile
  # datadog up`. Skip it on a t3.micro/t3.small runner.
  datadog-agent:
    image: gcr.io/datadoghq/agent:latest
    profiles: ["datadog"]
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_PROCESS_AGENT_ENABLED=false
    volumes:
      - ../monitoring/datadog/conf.d:/etc/datadog-agent/conf.d:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    depends_on:
      - pushgateway
